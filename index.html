<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login | Ultimate Leisure Club</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

  <div class="login-container">

    <img
      src="./assets/logo.png"
      alt="Ultimate Leisure Club"
      class="logo"
    >

    <h1 class="section-title">Resultados Service Center</h1>

    <form>
      <div class="field">
        <label>Correo electrónico</label>
        <input
          type="email"
          name="email"
          placeholder="usuario@ultimateleisureclub.com"
          required
        >
      </div>

      <div class="field">
        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          placeholder="********"
          required
        >
      </div>

      <button type="submit">Iniciar sesión</button>
    </form>

  </div>

  <!-- ✅ CARGA DEL LOGIN FUNCIONAL -->
  <script src="login.js"></script>

</body>
</html>
