<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados | Ultimate Leisure Club</title>
  <link rel="stylesheet" href="estilos.css">

  <style>
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th, td { padding:6px; text-align:left; }
    th { border-bottom:1px solid #ccc; }

    .valor {
      display:inline-block;
      min-width:80px;
      padding:6px 10px;
      border-radius:6px;
      text-align:center;
      font-weight:bold;
      background:#f4f6f8;
    }
    .rojo  { background:#f8d7da; color:#721c24; }
    .verde { background:#d4edda; color:#155724; }
    .azul  { background:#d1ecf1; color:#0c5460; }
  </style>
</head>

<body>

<div class="login-container">
  <h1>Resultados Service Center</h1>
  <p id="info-usuario"></p>
  <hr>

  <!-- TS -->
  <div id="ts" style="display:none;">
    <h2>Travel Specialist – Métricas MTD</h2>
    <table>
      <tr><th>Métrica</th><th>Resultado</th><th>Bono</th></tr>

      <tr><td>Noches Vendidas</td>
        <td><span id="ts_noches" class="valor"></span></td>
        <td><span id="ts_bono_noches" class="valor"></span></td></tr>

      <tr><td>QA</td>
        <td><span id="ts_qa" class="valor"></span></td>
        <td><span id="ts_bono_qa" class="valor"></span></td></tr>

      <tr><td>% Encuesta</td>
        <td><span id="ts_encuesta" class="valor"></span></td>
        <td><span id="ts_bono_encuesta" class="valor"></span></td></tr>

      <tr><td>Score</td>
        <td><span id="ts_score" class="valor"></span></td>
        <td><span id="ts_bono_score" class="valor"></span></td></tr>

      <tr><td>Ocupación RM</td>
        <td><span id="ts_rm" class="valor"></span></td>
        <td><span id="ts_bono_rm" class="valor"></span></td></tr>

      <tr><td>Ocupación PC</td>
        <td><span id="ts_pc" class="valor"></span></td>
        <td><span id="ts_bono_pc" class="valor"></span></td></tr>

      <tr><td>Ocupación PP</td>
        <td><span id="ts_pp" class="valor"></span></td>
        <td><span id="ts_bono_pp" class="valor"></span></td></tr>

      <tr><td>Ocupación SA</td>
        <td><span id="ts_sa" class="valor"></span></td>
        <td><span id="ts_bono_sa" class="valor"></span></td></tr>

      <tr><td>Ocupación CG</td>
        <td><span id="ts_cg" class="valor"></span></td>
        <td><span id="ts_bono_cg" class="valor"></span></td></tr>
    </table>
  </div>
</div>

<script>
const URL_TS =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTdv7cDmQ5U56rYvgTDFAsO_HQ3LPDj_PoAmMhodXdkvkaMaCTMRSejOI4w1cik3lQ6f4QhSYjpY-Pi/pub?gid=916846529&single=true&output=csv";

const usuario = localStorage.getItem("usuario");
const equipo  = localStorage.getItem("equipo");

if (!usuario || !equipo) location.href = "index.html";

document.getElementById("info-usuario").innerText =
  `Usuario: ${usuario} | Equipo: Travel Specialist`;

function num(v){
  return v ? Number(v.replace(/[^0-9.]/g,"")) : 0;
}

const bonoQA = q => q<85?0:q<=90?30:q<=95?50:80;
const bonoScore = s => s<4.5?0:s<4.8?50:80;
const bonoEncTS = e => e<74?0:e<=79?30:e<=85?50:80;

function cargarCSV(url, cb){
  fetch(url).then(r=>r.text()).then(csv=>{
    const rows = csv.trim().split("\n");
    const h = rows.shift().split(",").map(x=>x.toLowerCase());
    rows.forEach(r=>{
      const o={},v=r.split(",");
      h.forEach((k,i)=>o[k]=v[i]);
      if(o.email === usuario) cb(o);
    });
  });
}

document.getElementById("ts").style.display = "block";

cargarCSV(URL_TS, f => {
  const noches = num(f.noches);
  const qa = num(f.qa);
  const enc = num(f.encuesta);
  const score = num(f.score);

  document.getElementById("ts_noches").innerText = noches;
  document.getElementById("ts_qa").innerText = qa;
  document.getElementById("ts_encuesta").innerText = enc;
  document.getElementById("ts_score").innerText = score;

  document.getElementById("ts_bono_noches").innerText = Math.round(noches * 1.21);
  document.getElementById("ts_bono_qa").innerText = bonoQA(qa);
  document.getElementById("ts_bono_encuesta").innerText = bonoEncTS(enc);
  document.getElementById("ts_bono_score").innerText = bonoScore(score);

  ["rm","pc","pp","sa","cg"].forEach(k=>{
    document.getElementById(`ts_${k}`).innerText = num(f[k]);
    const m = {rm:.95,pc:.75,pp:.65,sa:.55,cg:.55}[k];
    document.getElementById(`ts_bono_${k}`).innerText =
      Math.round(num(f[k]) * m);
  });
});
</script>

</body>
</html>
