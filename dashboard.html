<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados | Ultimate Leisure Club</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background:#f4f6f8;
    }

    .login-container {
      width:420px;
      margin:80px auto;
      background:#fff;
      padding:30px;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      text-align:center;
    }

    table {
      width:100%;
      margin-top:20px;
      border-collapse:collapse;
    }

    th, td {
      padding:6px;
      text-align:left;
    }

    th {
      border-bottom:1px solid #ccc;
    }

    .valor {
      display:inline-block;
      min-width:80px;
      padding:6px 10px;
      border-radius:6px;
      text-align:center;
      font-weight:bold;
      background:#f4f6f8;
    }

    .rojo  { background:#f8d7da; color:#721c24; }
    .verde { background:#d4edda; color:#155724; }
    .azul  { background:#d1ecf1; color:#0c5460; }
  </style>
</head>

<body>

<div class="login-container">

<h1>Resultados Service Center</h1>
<p id="info-usuario"></p>
<hr>

<!-- ================= TS (NO TOCAR) ================= -->
<div id="ts" style="display:none;">
  <!-- TS ya implementado y validado, sin cambios -->
</div>

<!-- ================= MC ================= -->
<div id="mc" style="display:none;">
  <h2>Member Care – Métricas MTD</h2>

  <table>
    <tr><th>Métrica</th><th>Resultado</th><th>Bono</th></tr>

    <tr><td>SAME</td><td><span id="mc_same" class="valor"></span></td><td>-</td></tr>
    <tr><td>DNG</td><td><span id="mc_dng" class="valor"></span></td><td>-</td></tr>
    <tr><td>% SAME</td><td><span id="mc_psame" class="valor"></span></td><td>-</td></tr>
    <tr><td>Montos Recuperados</td><td><span id="mc_monto" class="valor"></span></td><td>-</td></tr>
    <tr><td>% WC</td><td><span id="mc_wc" class="valor"></span></td><td>-</td></tr>
    <tr><td>% Encuesta</td><td><span id="mc_encuesta" class="valor"></span></td><td>-</td></tr>
    <tr><td>QA</td><td><span id="mc_qa" class="valor"></span></td><td>-</td></tr>
    <tr><td>Score</td><td><span id="mc_score" class="valor"></span></td><td>-</td></tr>
  </table>
</div>

</div>

<script>
/* ================= SESIÓN ================= */

const usuario = localStorage.getItem("usuario");
const equipo  = localStorage.getItem("equipo");

document.getElementById("info-usuario").innerText =
  `Usuario: ${usuario} | Equipo: ${equipo === "MC" ? "Member Care" : "Travel Specialist"}`;

/* ================= HELPERS ================= */

const num = v => v ? Number(v.replace(/[^0-9.]/g,"")) : 0;

function marcar(el, color) {
  el.classList.remove("rojo","verde","azul");
  if (color) el.classList.add(color);
}

/* ================= MC ================= */

const URL_MC =
"https://docs.google.com/spreadsheets/d/e/PEGA_AQUI_EL_CSV_MC_MTD/pub?output=csv";

if (equipo === "MC") {
  document.getElementById("mc").style.display = "block";

  fetch(URL_MC)
    .then(r => r.text())
    .then(csv => {
      const rows = csv.trim().split("\n");
      const headers = rows.shift().split(",").map(h => h.toLowerCase());

      rows.forEach(r => {
        const o = {}, v = r.split(",");
        headers.forEach((k,i) => o[k] = v[i]);
        if (o.email !== usuario) return;

        const same = num(o.same);
        mc_same.innerText = same;
        marcar(mc_same, same < 12 ? "rojo" : same <= 14 ? "verde" : "azul");

        mc_dng.innerText = num(o.dng);

        const psame = num(o.psame);
        mc_psame.innerText = psame + "%";
        marcar(mc_psame, psame < 70 ? "rojo" : "verde");

        const monto = num(o.monto);
        mc_monto.innerText = monto;
        marcar(mc_monto, monto < 8000 ? "rojo" : monto <= 15000 ? "verde" : "azul");

        const wc = num(o.wc);
        mc_wc.innerText = wc + "%";
        marcar(mc_wc, wc < 96 ? "rojo" : "verde");

        const enc = num(o.encuesta);
        mc_encuesta.innerText = enc + "%";
        marcar(mc_encuesta, enc < 73 ? "rojo" : enc <= 79 ? "verde" : "azul");

        const qa = num(o.qa);
        mc_qa.innerText = qa + "%";
        marcar(mc_qa, qa < 91 ? "rojo" : qa <= 95 ? "verde" : "azul");

        const score = num(o.score);
        mc_score.innerText = score;
        marcar(mc_score, score < 4.5 ? "rojo" : score < 4.8 ? "verde" : "azul");
      });
    });
}
</script>

</body>
</html>
