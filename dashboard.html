<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados | Ultimate Leisure Club</title>
  <link rel="stylesheet" href="estilos.css">

  <style>
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th, td { padding:6px; text-align:left; }
    th { border-bottom:1px solid #ccc; }

    .valor {
      display:inline-block;
      min-width:80px;
      padding:6px 10px;
      border-radius:6px;
      text-align:center;
      font-weight:bold;
      background:#f4f6f8;
    }

    /* ==== COLORES RESTAURADOS ==== */
    .rojo  { background:#f8d7da; color:#721c24; }
    .verde { background:#d4edda; color:#155724; }
    .azul  { background:#d1ecf1; color:#0c5460; }

    .info-mensaje {
      margin-top:20px;
      padding:15px;
      background:#f9f9f9;
      border-radius:6px;
      color:#555;
    }
  </style>
</head>

<body>

<div class="login-container">
  <h1>Resultados Service Center</h1>
  <p id="info-usuario"></p>
  <hr>

  <!-- ================= TS ================= -->
  <div id="ts" style="display:none;">
    <h2>Travel Specialist – Métricas MTD</h2>

    <table>
      <tr><th>Métrica</th><th>Resultado</th><th>Bono</th></tr>

      <tr>
        <td>Noches Vendidas</td>
        <td><span id="ts_noches" class="valor"></span></td>
        <td><span id="ts_bono_noches" class="valor"></span></td>
      </tr>

      <tr>
        <td>QA</td>
        <td><span id="ts_qa" class="valor"></span></td>
        <td><span id="ts_bono_qa" class="valor"></span></td>
      </tr>

      <tr>
        <td>% Encuesta</td>
        <td><span id="ts_encuesta" class="valor"></span></td>
        <td><span id="ts_bono_encuesta" class="valor"></span></td>
      </tr>

      <tr>
        <td>Score</td>
        <td><span id="ts_score" class="valor"></span></td>
        <td><span id="ts_bono_score" class="valor"></span></td>
      </tr>
    </table>
  </div>

  <!-- ================= MC ================= -->
  <div id="mc" style="display:none;">
    <h2>Member Care – Métricas MTD</h2>
    <div class="info-mensaje">
      Las métricas de Member Care aún no están configuradas.<br>
      No se muestran métricas de otros equipos.
    </div>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const URL_TS =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTdv7cDmQ5U56rYvgTDFAsO_HQ3LPDj_PoAmMhodXdkvkaMaCTMRSejOI4w1cik3lQ6f4QhSYjpY-Pi/pub?gid=916846529&single=true&output=csv";

/* ================= SESIÓN ================= */
const usuario = localStorage.getItem("usuario");
const equipo  = localStorage.getItem("equipo");

if (!usuario || !equipo) location.href = "index.html";

document.getElementById("info-usuario").innerText =
`Usuario: ${usuario} | Equipo: ${equipo === "MC" ? "Member Care" : "Travel Specialist"}`;

/* ================= HELPERS ================= */
const num = v => v ? Number(v.replace(/[^0-9.]/g,"")) : 0;

function marcarColor(el, valor, limites){
  el.classList.remove("rojo","verde","azul");
  if (valor < limites.rojo) el.classList.add("rojo");
  else if (valor < limites.azul) el.classList.add("azul");
  else el.classList.add("verde");
}

function cargarCSV(url, cb){
  fetch(url).then(r=>r.text()).then(csv=>{
    const rows = csv.trim().split("\n");
    const h = rows.shift().split(",").map(x=>x.toLowerCase());
    rows.forEach(r=>{
      const o={},v=r.split(",");
      h.forEach((k,i)=>o[k]=v[i]);
      if (o.email === usuario) cb(o);
    });
  });
}

/* ================= LÓGICA ================= */

if (equipo === "TS") {
  document.getElementById("ts").style.display = "block";

  cargarCSV(URL_TS, f=>{
    const noches = num(f.noches);
    const qa = num(f.qa);
    const enc = num(f.encuesta);
    const score = num(f.score);

    ts_noches.innerText = noches;
    ts_qa.innerText = qa;
    ts_encuesta.innerText = enc;
    ts_score.innerText = score;

    marcarColor(ts_qa, qa, {rojo:85, azul:90});
    marcarColor(ts_encuesta, enc, {rojo:74, azul:80});
    marcarColor(ts_score, score, {rojo:4.5, azul:4.8});
  });

} else if (equipo === "MC") {
  document.getElementById("mc").style.display = "block";
}
</script>

</body>
</html>
