<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados | Ultimate Leisure Club</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; }
    .login-container {
      width:420px; margin:80px auto; background:#fff; padding:30px;
      border-radius:10px; box-shadow:0 10px 25px rgba(0,0,0,.08); text-align:center;
    }
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th,td { padding:6px; text-align:left; }
    th { border-bottom:1px solid #ccc; }
    .valor {
      display:inline-block; min-width:80px; padding:6px 10px;
      border-radius:6px; text-align:center; font-weight:bold; background:#f4f6f8;
    }
    .rojo{background:#f8d7da;color:#721c24}
    .verde{background:#d4edda;color:#155724}
    .azul{background:#d1ecf1;color:#0c5460}
  </style>
</head>

<body>
<div class="login-container">
<h1>Resultados Service Center</h1>
<p id="info-usuario"></p>
<hr>

<!-- ================= TS ================= -->
<div id="ts" style="display:none">
<h2>Travel Specialist – Métricas MTD</h2>
<table>
<tr><th>Métrica</th><th>Resultado</th><th>Bono</th></tr>
<tr><td>Noches Vendidas</td><td><span id="noches" class="valor"></span></td><td><span id="bono_noches" class="valor"></span></td></tr>
<tr><td>QA</td><td><span id="qa" class="valor"></span></td><td><span id="bono_qa" class="valor"></span></td></tr>
<tr><td>% Encuesta</td><td><span id="encuesta" class="valor"></span></td><td><span id="bono_encuesta" class="valor"></span></td></tr>
<tr><td>Score</td><td><span id="score" class="valor"></span></td><td><span id="bono_score" class="valor"></span></td></tr>
<tr><td>Ocupación RM</td><td><span id="rm" class="valor"></span></td><td><span id="bono_rm" class="valor"></span></td></tr>
<tr><td>Ocupación PC</td><td><span id="pc" class="valor"></span></td><td><span id="bono_pc" class="valor"></span></td></tr>
<tr><td>Ocupación PP</td><td><span id="pp" class="valor"></span></td><td><span id="bono_pp" class="valor"></span></td></tr>
<tr><td>Ocupación SA</td><td><span id="sa" class="valor"></span></td><td><span id="bono_sa" class="valor"></span></td></tr>
<tr><td>Ocupación CG</td><td><span id="cg" class="valor"></span></td><td><span id="bono_cg" class="valor"></span></td></tr>
</table>
</div>

<!-- ================= MC ================= -->
<div id="mc" style="display:none">
<h2>Member Care – Métricas MTD</h2>
<table>
<tr><th>Métrica</th><th>Resultado</th><th>Bono</th></tr>
<tr><td>SAME</td><td><span id="mc_same" class="valor"></span></td><td><span id="mc_bono_same" class="valor"></span></td></tr>
<tr><td>DNG</td><td><span id="mc_dng" class="valor"></span></td><td><span id="mc_bono_dng" class="valor"></span></td></tr>
<tr><td>% SAME</td><td><span id="mc_psame" class="valor"></span></td><td>-</td></tr>
<tr><td>Montos Recuperados</td><td><span id="mc_monto" class="valor"></span></td><td><span id="mc_bono_monto" class="valor"></span></td></tr>
<tr><td>% WC</td><td><span id="mc_wc" class="valor"></span></td><td><span id="mc_bono_wc" class="valor"></span></td></tr>
<tr><td>% Encuesta</td><td><span id="mc_encuesta" class="valor"></span></td><td><span id="mc_bono_encuesta" class="valor"></span></td></tr>
<tr><td>QA</td><td><span id="mc_qa" class="valor"></span></td><td><span id="mc_bono_qa" class="valor"></span></td></tr>
<tr><td>Score</td><td><span id="mc_score" class="valor"></span></td><td><span id="mc_bono_score" class="valor"></span></td></tr>
</table>
</div>

</div>

<script>
const usuario = localStorage.getItem("usuario");
const equipo  = localStorage.getItem("equipo");
document.getElementById("info-usuario").innerText =
`Usuario: ${usuario} | Equipo: ${equipo==="MC"?"Member Care":"Travel Specialist"}`;

const num=v=>v?Number(String(v).replace(/[^0-9.]/g,"")):0;
const marcar=(el,c)=>{el.classList.remove("rojo","verde","azul");if(c)el.classList.add(c)};

/* ================= TS ================= */
if(equipo==="TS"){
document.getElementById("ts").style.display="block";
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTdv7cDmQ5U56rYvgTDFAsO_HQ3LPDj_PoAmMhodXdkvkaMaCTMRSejOI4w1cik3lQ6f4QhSYjpY-Pi/pub?gid=916846529&single=true&output=csv")
.then(r=>r.text()).then(csv=>{
const rows=csv.trim().split("\n"),h=rows.shift().split(",").map(x=>x.toLowerCase());
rows.forEach(r=>{
const o={},v=r.split(",");h.forEach((k,i)=>o[k]=v[i]);if(o.email!==usuario)return;
noches.innerText=num(o.noches);bono_noches.innerText=Math.round(num(o.noches)*1.21);
qa.innerText=num(o.qa)+"%"; marcar(qa,num(o.qa)<91?"rojo":num(o.qa)<=95?"verde":"azul");
bono_qa.innerText=num(o.qa)<91?0:num(o.qa)<=95?50:80;
encuesta.innerText=num(o.encuesta)+"%"; marcar(encuesta,num(o.encuesta)<80?"rojo":num(o.encuesta)<=85?"verde":"azul");
bono_encuesta.innerText=num(o.encuesta)<80?0:num(o.encuesta)<=85?50:80;
score.innerText=num(o.score); marcar(score,num(o.score)<4.5?"rojo":num(o.score)<4.8?"verde":"azul");
bono_score.innerText=num(o.score)<4.5?0:num(o.score)<4.8?50:80;
["rm","pc","pp","sa","cg"].forEach(k=>{
document.getElementById(k).innerText=num(o[k]);
document.getElementById("bono_"+k).innerText=Math.round(num(o[k])*{rm:.95,pc:.75,pp:.65,sa:.55,cg:.55}[k]);
});
});
});
}

/* ================= MC ================= */
if(equipo==="MC"){
document.getElementById("mc").style.display="block";
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTdv7cDmQ5U56rYvgTDFAsO_HQ3LPDj_PoAmMhodXdkvkaMaCTMRSejOI4w1cik3lQ6f4QhSYjpY-Pi/pub?gid=0&single=true&output=csv")
.then(r=>r.text()).then(csv=>{
const rows=csv.trim().split("\n"),h=rows.shift().split(",").map(x=>x.toLowerCase());
rows.forEach(r=>{
const o={},v=r.split(",");h.forEach((k,i)=>o[k]=v[i]);if(o.email!==usuario)return;

const same=num(o.same);
mc_same.innerText=same; marcar(mc_same,same<12?"rojo":same<=14?"verde":"azul");
mc_bono_same.innerText=same<=14?same*22:same<=19?same*23:same*25;

const ps=num(o.psame);
mc_psame.innerText=ps+"%";

mc_dng.innerText=num(o.dng);
mc_bono_dng.innerText=(ps>=70||same>=17)?num(o.dng)*10:0;

const monto=num(o.monto);
mc_monto.innerText=monto; marcar(mc_monto,monto<8000?"rojo":monto<=15000?"verde":"azul");
mc_bono_monto.innerText=Math.round(monto*0.01);

const wc=num(o.wc);
mc_wc.innerText=wc+"%"; marcar(mc_wc,wc<96?"rojo":"verde");
mc_bono_wc.innerText=wc>=96?120:0;

const enc=num(o.encuesta);
mc_encuesta.innerText=enc+"%"; marcar(mc_encuesta,enc<73?"rojo":enc<=79?"verde":"azul");
mc_bono_encuesta.innerText=enc<66?0:enc<=72?30:enc<=79?50:80;

const qa=num(o.qa);
mc_qa.innerText=qa+"%"; marcar(mc_qa,qa<85?"rojo":qa<=90?"verde":qa<=95?"azul":"azul");
mc_bono_qa.innerText=qa<85?0:qa<=90?30:qa<=95?50:80;

const sc=num(o.score);
mc_score.innerText=sc; marcar(mc_score,sc<4.5?"rojo":sc<4.8?"verde":"azul");
mc_bono_score.innerText=sc<4.5?0:sc<4.8?50:80;
});
});
}
</script>
</body>
</html>
``
