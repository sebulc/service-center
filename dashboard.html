<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultados | Ultimate Leisure Club</title>

  <link rel="stylesheet" href="estilos.css">

  <style>
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th, td { padding:6px; text-align:left; }
    th { border-bottom:1px solid #ccc; }

    .valor {
      display:inline-block;
      min-width:80px;
      padding:6px 10px;
      border-radius:6px;
      text-align:center;
      font-weight:bold;
      background:#f4f6f8;
    }

    .rojo  { background:#f8d7da; color:#721c24; }
    .verde { background:#d4edda; color:#155724; }
    .azul  { background:#d1ecf1; color:#0c5460; }
  </style>
</head>

<body>

<div class="login-container">
  <h1>Resultados Service Center</h1>
  <p id="info-usuario"></p>
  <hr>

  <!-- MEMBER CARE -->
  <div id="mc" style="display:none;">
    <h2>Member Care – Métricas MTD</h2>
    <table>
      <tr><th>Métrica</th><th>Resultado</th></tr>
      <tr><td>SAME</td><td><span id="mc_same" class="valor"></span></td></tr>
      <tr><td>DNG</td><td><span id="mc_dng" class="valor"></span></td></tr>
      <tr><td>% SAME</td><td><span id="mc_psame" class="valor"></span></td></tr>
      <tr><td>Montos Recuperados</td><td><span id="mc_monto" class="valor"></span></td></tr>
      <tr><td>% WC</td><td><span id="mc_wc" class="valor"></span></td></tr>
      <tr><td>% Encuesta</td><td><span id="mc_encuesta" class="valor"></span></td></tr>
      <tr><td>QA</td><td><span id="mc_qa" class="valor"></span></td></tr>
      <tr><td>Score</td><td><span id="mc_score" class="valor"></span></td></tr>
    </table>
  </div>

  <!-- TRAVEL SPECIALIST -->
  <div id="ts" style="display:none;">
    <h2>Travel Specialist – Métricas MTD</h2>
    <table>
      <tr><th>Métrica</th><th>Resultado</th></tr>
      <tr><td>Noches Vendidas</td><td><span id="ts_noches" class="valor"></span></td></tr>
      <tr><td>QA</td><td><span id="ts_qa" class="valor"></span></td></tr>
      <tr><td>% Encuesta</td><td><span id="ts_encuesta" class="valor"></span></td></tr>
      <tr><td>Score</td><td><span id="ts_score" class="valor"></span></td></tr>
      <tr><td>Ocupación RM</td><td><span id="ts_rm" class="valor"></span></td></tr>
      <tr><td>Ocupación PC</td><td><span id="ts_pc" class="valor"></span></td></tr>
      <tr><td>Ocupación PP</td><td><span id="ts_pp" class="valor"></span></td></tr>
      <tr><td>Ocupación SA</td><td><span id="ts_sa" class="valor"></span></td></tr>
      <tr><td>Ocupación CG</td><td><span id="ts_cg" class="valor"></span></td></tr>
    </table>
  </div>
</div>

<script>
const URL_MC = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdv7cDmQ5U56rYvgTDFAsO_HQ3LPDj_PoAmMhodXdkvkaMaCTMRSejOI4w1cik3lQ6f4QhSYjpY-Pi/pub?gid=0&single=true&output=csv";
const URL_TS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdv7cDmQ5U56rYvgTDFAsO_HQ3LPDj_PoAmMhodXdkvkaMaCTMRSejOI4w1cik3lQ6f4QhSYjpY-Pi/pub?gid=916846529&single=true&output=csv";

const usuario = localStorage.getItem("usuario");
const equipo  = localStorage.getItem("equipo");

if (!usuario || !equipo) window.location.href = "index.html";

document.getElementById("info-usuario").innerText =
  "Usuario: " + usuario + " | Equipo: " + (equipo === "MC" ? "Member Care" : "Travel Specialist");

function pintar(id, valor, reglas) {
  const el = document.getElementById(id);
  el.innerText = valor;
  el.classList.remove("rojo","verde","azul");
  if (reglas.azul !== undefined && valor >= reglas.azul) el.classList.add("azul");
  else if (valor >= reglas.verde) el.classList.add("verde");
  else el.classList.add("rojo");
}

function cargarDatos(url, callback) {
  fetch(url)
    .then(r => r.text())
    .then(csv => {
      const filas = csv.trim().split("\n").map(f => f.split(","));
      const headers = filas.shift();
      const idx = {};
      headers.forEach((h,i)=>idx[h]=i);
      const fila = filas.find(f => f[idx.email] === usuario);
      if (fila) callback(fila, idx);
    });
}

if (equipo === "MC") {
  document.getElementById("mc").style.display = "block";
  cargarDatos(URL_MC, (f,i)=>{
    pintar("mc_same", +f[i.same], {verde:12, azul:15});
    document.getElementById("mc_dng").innerText = f[i.dng];
    pintar("mc_psame", +f[i.psame], {verde:70});
    pintar("mc_monto", +f[i.monto], {verde:8000, azul:15000});
    pintar("mc_wc", +f[i.wc], {verde:96});
    pintar("mc_encuesta", +f[i.encuesta], {verde:73, azul:80});
    pintar("mc_qa", +f[i.qa], {verde:91, azul:96});
    
pintar(
  "mc_score",
  parseFloat(f[i.score].trim()),
  { verde: 4.5, azul: 4.8 }
);

  });
}

if (equipo === "TS") {
  document.getElementById("ts").style.display = "block";
  cargarDatos(URL_TS, (f,i)=>{
    pintar("ts_noches", +f[i.noches], {verde:500, azul:600});
    pintar("ts_qa", +f[i.qa], {verde:91, azul:96});
    pintar("ts_encuesta", +f[i.encuesta], {verde:80, azul:86});
    pintar("ts_score", +f[i.score], {verde:4.5, azul:4.8});
    document.getElementById("ts_rm").innerText = f[i.rm];
    document.getElementById("ts_pc").innerText = f[i.pc];
    document.getElementById("ts_pp").innerText = f[i.pp];
    document.getElementById("ts_sa").innerText = f[i.sa];
    document.getElementById("ts_cg").innerText = f[i.cg];
  });
}
</script>

</body>
</html>
